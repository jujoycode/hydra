<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="badgeG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#458a68"/><stop offset="1" stop-color="#356b50"/></linearGradient>
  </defs>

  <!-- solid green badge for max contrast at tiny sizes -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#badgeG)"/>

  <!-- bold cream hydra silhouette (overlapping same-fill shapes = seamless) -->
  <g fill="#f4eee2">
    <ellipse cx="256" cy="372" rx="124" ry="82"/>
    <rect x="148" y="196" width="52" height="186" rx="26"/>
    <rect x="312" y="196" width="52" height="186" rx="26"/>
    <rect x="222" y="150" width="68" height="232" rx="34"/>
    <circle cx="174" cy="196" r="60"/>
    <circle cx="338" cy="196" r="60"/>
    <circle cx="256" cy="150" r="76"/>
  </g>

  <!-- eyes -->
  <g fill="#22402f">
    <circle cx="238" cy="140" r="10"/>
    <circle cx="274" cy="140" r="10"/>
    <circle cx="160" cy="190" r="8"/>
    <circle cx="188" cy="190" r="8"/>
    <circle cx="324" cy="190" r="8"/>
    <circle cx="352" cy="190" r="8"/>
  </g>
</svg>
