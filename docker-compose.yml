services:
  postgres:
    image: postgres:16-alpine
    container_name: hydra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hydra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - hydra_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres', '-d', 'hydra']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  mysql:
    image: mysql:8.0
    container_name: hydra-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hydra
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql}
    ports:
      - '3306:3306'
    volumes:
      - hydra_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'sh', '-c', 'mysqladmin ping -h localhost -p"$$MYSQL_ROOT_PASSWORD"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  hydra_data:
  hydra_mysql_data:
